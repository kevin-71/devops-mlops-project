name: Model Promotion Pipeline

on:
  push:
    branches:
      - staging

env:
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
  MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

jobs:
  promotion-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-backend.txt
          pip install dvc

      - name: Fetch DVC data
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_USER_TOKEN }}
        run: |
          # If you use DagsHub auth config for CI, adapt as needed
          dvc pull || true

      - name: Train candidate model
        run: |
          python -m backend.train --refresh

      - name: Deploy staging (docker-compose)
        run: |
          docker compose up -d backend || true
          sleep 10

      - name: Run Quality Gates
        run: |
          python scripts/quality_gates.py

      - name: Cleanup
        if: always()
        run: docker compose down || true
