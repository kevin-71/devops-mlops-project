version: 1
services:
  - type: web
    name: backend
    env: docker
    dockerfilePath: Dockerfile.backend
    dockerCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: starter
    healthCheckPath: /health

  - type: web
    name: frontend
    env: docker
    dockerfilePath: Dockerfile.frontend
    dockerCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0
    plan: starter
    healthCheckPath: /

  - type: cron
    name: nightly-pipeline
    env: docker
    schedule: "0 3 * * *"
    dockerfilePath: Dockerfile.backend
    dockerCommand: python -m backend.train --refresh && python scripts/quality_gates.py
    plan: starter